<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="Rhinalx — an AI memory system for scientific reasoning">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15926A"/>
      <stop offset="1" stop-color="#0C5C40"/>
    </linearGradient>
  </defs>
  <!-- self-contained card so it reads on both light and dark GitHub themes -->
  <rect x="1" y="1" width="1198" height="258" rx="22" fill="#FBFAF5" stroke="#E7E3D5" stroke-width="2"/>
  <!-- faint grid, echoing the app's paper -->
  <g stroke="#EFEAD8" stroke-width="1">
    <path d="M0 65 H1200 M0 130 H1200 M0 195 H1200"/>
  </g>
  <rect x="1" y="1" width="1198" height="258" rx="22" fill="none" stroke="#E7E3D5" stroke-width="2"/>

  <!-- logo tile: white R over a gold "ghost" R (a palimpsest: overwritten, still readable) -->
  <g transform="translate(56,70)">
    <rect width="120" height="120" rx="26" fill="url(#tile)"/>
    <text x="63" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" text-anchor="middle" fill="#E3B45F" opacity="0.55">R</text>
    <text x="60" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" text-anchor="middle" fill="#FFFFFF">R</text>
  </g>

  <!-- wordmark + tagline -->
  <text x="210" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#14261E">Rhinalx</text>
  <text x="213" y="152" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#45564E">An AI memory system for scientific reasoning</text>

  <!-- capability chips -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="600">
    <g transform="translate(213,178)">
      <rect width="118" height="30" rx="15" fill="#E3F1EA" stroke="#BFE0CF"/>
      <text x="59" y="20" text-anchor="middle" fill="#0C5C40">local-first</text>
    </g>
    <g transform="translate(343,178)">
      <rect width="176" height="30" rx="15" fill="#E3F1EA" stroke="#BFE0CF"/>
      <text x="88" y="20" text-anchor="middle" fill="#0C5C40">provenance-always</text>
    </g>
    <g transform="translate(531,178)">
      <rect width="168" height="30" rx="15" fill="#F7EFD9" stroke="#EBD9AF"/>
      <text x="84" y="20" text-anchor="middle" fill="#8A6414">Claude + Ollama</text>
    </g>
    <g transform="translate(711,178)">
      <rect width="120" height="30" rx="15" fill="#F7EFD9" stroke="#EBD9AF"/>
      <text x="60" y="20" text-anchor="middle" fill="#8A6414">MCP server</text>
    </g>
  </g>
</svg>
